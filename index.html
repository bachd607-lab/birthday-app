<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Social | GenZ Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">
        <i class="fa-solid fa-music"></i>
    </button>
    <div style="position: absolute; left: -9999px;"><div id="player"></div></div>

    <div id="auth-card" class="card">
        <h1>Hey Bestie!</h1>
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Tên đăng nhập">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>
        <button onclick="handleAuth()" id="auth-btn">Vào Team 🔥</button>
        <p class="link-text" id="toggle-text">Chưa có acc? <span onclick="toggleAuth()">Đăng ký ngay</span></p>
    </div>

    <div id="dashboard-card" class="card hidden main-app">
        <div id="tab-birthdays" class="tab-content">
            <div id="next-birthday-box" class="countdown-box">
                <div id="countdown-timer">Đang tính toán...</div>
            </div>
            <h2>My Squad 🎂</h2>
            <div class="add-box">
                <input type="text" id="friendName" placeholder="Tên bạn ấy...">
                <input type="date" id="birthDate">
                <button onclick="addBirthday()">Lưu Lại</button>
            </div>
            <div id="birthdayList" class="list-container"></div>
        </div>

        <div id="tab-feed" class="tab-content hidden">
            <h2>Community 🌎</h2>
            <div class="add-box">
                <textarea id="postContent" placeholder="Hôm nay bạn thế nào?"></textarea>
                <button onclick="createPost()">Đăng bài</button>
            </div>
            <div id="feedList" class="list-container"></div>
        </div>

        <div id="tab-friends" class="tab-content hidden">
            <h2>Find Friends 🔍</h2>
            <div class="add-box">
                <input type="text" id="searchUser" placeholder="Nhập tên đăng nhập...">
                <button onclick="findUser()">Tìm kiếm</button>
            </div>
            <div id="searchResult"></div>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <h3>Bạn bè</h3>
            <div id="friendList" class="list-container"></div>
        </div>

        <div class="bottom-nav">
            <div onclick="switchTab('birthdays')"><i class="fa-solid fa-cake-candles"></i></div>
            <div onclick="switchTab('feed')"><i class="fa-solid fa-house"></i></div>
            <div onclick="switchTab('friends')"><i class="fa-solid fa-user-group"></i></div>
            <div onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
